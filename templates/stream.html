<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kinva Master - Live Stream Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .stream-container {
            display: flex;
            height: 100vh;
        }
        
        .video-container {
            flex: 3;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .stream-frame {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .controls-sidebar {
            flex: 1;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-left: 1px solid rgba(255,215,0,0.3);
        }
        
        .stream-info {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
        }
        
        .stream-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stream-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            color: #ccc;
            font-size: 0.9rem;
        }
        
        .stat-badge {
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .effects-panel {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .effects-title {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .effects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }
        
        .effect-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        
        .effect-btn:hover {
            background: rgba(255,215,0,0.2);
            transform: translateY(-2px);
            border-color: #ffd700;
        }
        
        .effect-btn.active {
            background: #ffd700;
            color: #1a1a2e;
            border-color: #ffd700;
        }
        
        .effect-btn i {
            font-size: 24px;
            display: block;
            margin-bottom: 8px;
        }
        
        .effect-btn span {
            font-size: 12px;
        }
        
        .chat-section {
            border-top: 1px solid rgba(255,215,0,0.3);
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }
        
        .chat-messages {
            height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        
        .chat-message {
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        
        .chat-message .user {
            color: #ffd700;
            font-weight: bold;
        }
        
        .chat-input {
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .chat-input button {
            padding: 10px 20px;
            background: #ffd700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .overlay-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        
        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 30px;
            transition: all 0.3s;
        }
        
        .control-btn:hover {
            background: rgba(255,215,0,0.3);
        }
        
        .quality-badge {
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .recording-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(220,53,69,0.9);
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .recording-dot {
            width: 10px;
            height: 10px;
            background: #ff0000;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            border-left: 4px solid #ffd700;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .stream-container {
                flex-direction: column;
            }
            .video-container {
                height: 60vh;
            }
            .controls-sidebar {
                height: 40vh;
            }
            .effects-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="stream-container">
        <!-- Video Container -->
        <div class="video-container">
            <img id="streamFrame" class="stream-frame" alt="Live Stream">
            
            <!-- Overlay Controls -->
            <div class="overlay-controls">
                <button class="control-btn" onclick="toggleFullscreen()">
                    <i class="fas fa-expand"></i> Fullscreen
                </button>
                <div class="quality-badge" id="qualityBadge">
                    <i class="fas fa-chart-line"></i> <span id="currentQuality">720p</span>
                </div>
                <button class="control-btn" onclick="toggleRecording()" id="recordBtn">
                    <i class="fas fa-circle"></i> Record
                </button>
                <button class="control-btn" onclick="screenshot()">
                    <i class="fas fa-camera"></i> Screenshot
                </button>
                <button class="control-btn" onclick="shareStream()">
                    <i class="fas fa-share-alt"></i> Share
                </button>
            </div>
            
            <!-- Recording Indicator -->
            <div id="recordingIndicator" class="recording-indicator" style="display: none;">
                <div class="recording-dot"></div>
                <span>REC</span>
            </div>
        </div>
        
        <!-- Controls Sidebar -->
        <div class="controls-sidebar">
            <div class="stream-info">
                <div class="stream-title">
                    <i class="fas fa-video"></i> Kinva Master Live
                </div>
                <div class="stream-stats">
                    <span class="stat-badge"><i class="fas fa-eye"></i> <span id="viewerCount">0</span> watching</span>
                    <span class="stat-badge"><i class="fas fa-clock"></i> <span id="streamDuration">0:00</span></span>
                    <span class="stat-badge"><i class="fas fa-user"></i> <span id="streamerName">Anonymous</span></span>
                </div>
            </div>
            
            <div class="effects-panel">
                <div class="effects-title">
                    <i class="fas fa-magic"></i> Live Effects
                    <span style="font-size: 12px; color: #ffd700;">Click to apply</span>
                </div>
                <div class="effects-grid" id="effectsGrid">
                    <div class="effect-btn" data-effect="vintage">
                        <i class="fas fa-camera-retro"></i>
                        <span>Vintage</span>
                    </div>
                    <div class="effect-btn" data-effect="cinematic">
                        <i class="fas fa-film"></i>
                        <span>Cinematic</span>
                    </div>
                    <div class="effect-btn" data-effect="black_white">
                        <i class="fas fa-adjust"></i>
                        <span>B&W</span>
                    </div>
                    <div class="effect-btn" data-effect="sepia">
                        <i class="fas fa-leaf"></i>
                        <span>Sepia</span>
                    </div>
                    <div class="effect-btn" data-effect="glitch">
                        <i class="fas fa-bolt"></i>
                        <span>Glitch</span>
                    </div>
                    <div class="effect-btn" data-effect="neon">
                        <i class="fas fa-lightbulb"></i>
                        <span>Neon</span>
                    </div>
                    <div class="effect-btn" data-effect="blur">
                        <i class="fas fa-tint"></i>
                        <span>Blur</span>
                    </div>
                    <div class="effect-btn" data-effect="vhs">
                        <i class="fas fa-tape"></i>
                        <span>VHS</span>
                    </div>
                    <div class="effect-btn" data-effect="retro">
                        <i class="fas fa-history"></i>
                        <span>Retro</span>
                    </div>
                    <div class="effect-btn" data-effect="glow">
                        <i class="fas fa-sun"></i>
                        <span>Glow</span>
                    </div>
                    <div class="effect-btn" data-effect="sketch">
                        <i class="fas fa-pencil-alt"></i>
                        <span>Sketch</span>
                    </div>
                    <div class="effect-btn" data-effect="cartoon">
                        <i class="fas fa-smile"></i>
                        <span>Cartoon</span>
                    </div>
                </div>
            </div>
            
            <div class="chat-section">
                <div class="effects-title">
                    <i class="fas fa-comments"></i> Live Chat
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-message text-muted text-center">Welcome to the stream!</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Say something..." onkeypress="handleChatKeypress(event)">
                    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Stream Configuration
        let sessionId = new URLSearchParams(window.location.search).get('session') || 'live_' + Date.now();
        let streamSource = null;
        let activeEffects = [];
        let socket = null;
        let streamStartTime = Date.now();
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        
        // DOM Elements
        const streamFrame = document.getElementById('streamFrame');
        const viewerCountSpan = document.getElementById('viewerCount');
        const streamDurationSpan = document.getElementById('streamDuration');
        const chatMessagesDiv = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        
        // Initialize Socket.IO
        function initSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('Connected to server');
                socket.emit('join_room', { room: sessionId });
                showNotification('Connected to live stream!', 'success');
            });
            
            socket.on('effect_updated', (data) => {
                console.log('Effect updated:', data);
                updateEffectButtons(data.effects);
            });
            
            socket.on('new_message', (data) => {
                addChatMessage(data.user, data.message, data.timestamp);
            });
            
            socket.on('viewer_update', (data) => {
                viewerCountSpan.textContent = data.count;
            });
            
            socket.on('stream_ended', () => {
                showNotification('Stream has ended', 'warning');
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);
            });
        }
        
        // Connect to stream
        async function connectStream() {
            try {
                const response = await fetch(`/api/stream/video/${sessionId}`);
                const reader = response.body.getReader();
                
                async function read() {
                    const {done, value} = await reader.read();
                    if (done) return;
                    
                    const blob = new Blob([value], {type: 'image/jpeg'});
                    const url = URL.createObjectURL(blob);
                    streamFrame.src = url;
                    setTimeout(() => URL.revokeObjectURL(url), 100);
                    
                    read();
                }
                
                read();
                showNotification('Connected to stream!', 'success');
            } catch (error) {
                console.error('Stream connection error:', error);
                showNotification('Failed to connect to stream', 'error');
            }
        }
        
        // Apply effect
        async function applyEffect(effect) {
            if (activeEffects.includes(effect)) {
                activeEffects = activeEffects.filter(e => e !== effect);
            } else {
                activeEffects.push(effect);
            }
            
            // Update UI
            updateEffectButtons(activeEffects);
            
            // Send to server
            try {
                await fetch('/api/stream/effect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        effects: activeEffects
                    })
                });
                
                showNotification(`${effect} effect ${activeEffects.includes(effect) ? 'applied' : 'removed'}`, 'info');
            } catch (error) {
                console.error('Effect update error:', error);
            }
        }
        
        // Update effect buttons UI
        function updateEffectButtons(effects) {
            document.querySelectorAll('.effect-btn').forEach(btn => {
                const effect = btn.dataset.effect;
                if (effects.includes(effect)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        // Send chat message
        function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            
            socket.emit('send_message', {
                room: sessionId,
                message: message,
                user: getUsername()
            });
            
            chatInput.value = '';
        }
        
        function handleChatKeypress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        function addChatMessage(user, message, timestamp) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message';
            messageDiv.innerHTML = `
                <span class="user">${user}:</span>
                <span>${message}</span>
                <span style="color:#666; font-size:10px; margin-left:8px">${timestamp}</span>
            `;
            chatMessagesDiv.appendChild(messageDiv);
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
            
            // Keep only last 100 messages
            while (chatMessagesDiv.children.length > 100) {
                chatMessagesDiv.removeChild(chatMessagesDiv.firstChild);
            }
        }
        
        // Toggle fullscreen
        function toggleFullscreen() {
            const container = document.querySelector('.video-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Take screenshot
        function screenshot() {
            const canvas = document.createElement('canvas');
            canvas.width = streamFrame.naturalWidth;
            canvas.height = streamFrame.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(streamFrame, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `screenshot_${Date.now()}.png`;
                a.click();
                URL.revokeObjectURL(url);
                showNotification('Screenshot saved!', 'success');
            });
        }
        
        // Toggle recording
        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        function startRecording() {
            const stream = streamFrame.captureStream();
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, {type: 'video/webm'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `recording_${Date.now()}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                recordedChunks = [];
                showNotification('Recording saved!', 'success');
            };
            
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('recordingIndicator').style.display = 'flex';
            document.getElementById('recordBtn').innerHTML = '<i class="fas fa-stop"></i> Stop';
            showNotification('Recording started', 'info');
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('recordingIndicator').style.display = 'none';
                document.getElementById('recordBtn').innerHTML = '<i class="fas fa-circle"></i> Record';
            }
        }
        
        // Share stream
        async function shareStream() {
            const shareUrl = window.location.href;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Kinva Master Live Stream',
                        text: 'Join my live stream!',
                        url: shareUrl
                    });
                } catch (error) {
                    copyToClipboard(shareUrl);
                }
            } else {
                copyToClipboard(shareUrl);
            }
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showNotification('Link copied to clipboard!', 'success');
        }
        
        // Get username
        function getUsername() {
            let username = localStorage.getItem('streamUsername');
            if (!username) {
                username = prompt('Enter your name for chat:', 'Anonymous');
                if (!username) username = 'Anonymous';
                localStorage.setItem('streamUsername', username);
            }
            return username;
        }
        
        // Update stream duration
        function updateDuration() {
            const elapsed = Math.floor((Date.now() - streamStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            streamDurationSpan.textContent = `${minutes}:${seconds.toString().padStart(2,'0')}`;
        }
        
        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            const icon = type === 'success' ? 'fa-check-circle' : 
                        type === 'error' ? 'fa-exclamation-circle' : 
                        type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle';
            notification.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // Change quality
        async function changeQuality(quality) {
            try {
                const response = await fetch('/api/stream/quality', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        quality: quality
                    })
                });
                
                if (response.ok) {
                    document.getElementById('currentQuality').textContent = quality;
                    showNotification(`Quality changed to ${quality}`, 'success');
                }
            } catch (error) {
                console.error('Quality change error:', error);
            }
        }
        
        // Quality selector
        function showQualitySelector() {
            const qualities = ['144p', '240p', '360p', '480p', '720p', '1080p', '4K'];
            const qualityHtml = qualities.map(q => `
                <div class="quality-option" onclick="changeQuality('${q}')">${q}</div>
            `).join('');
            
            // Create modal or dropdown
            const modal = document.createElement('div');
            modal.className = 'quality-modal';
            modal.innerHTML = `
                <div class="quality-modal-content">
                    <h3>Select Quality</h3>
                    <div class="quality-options">${qualityHtml}</div>
                    <button onclick="this.parentElement.parentElement.remove()">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        // Handle visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                console.log('Stream tab hidden');
            } else {
                console.log('Stream tab visible');
            }
        });
        
        // Handle before unload
        window.addEventListener('beforeunload', () => {
            if (socket) {
                socket.emit('leave_room', { room: sessionId });
            }
            if (isRecording) {
                stopRecording();
            }
        });
        
        // Initialize
        function init() {
            initSocket();
            connectStream();
            setInterval(updateDuration, 1000);
            
            // Add effect button listeners
            document.querySelectorAll('.effect-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const effect = btn.dataset.effect;
                    applyEffect(effect);
                });
            });
            
            // Set streamer name
            document.getElementById('streamerName').textContent = getUsername();
            
            showNotification('Welcome to the live stream!', 'success');
        }
        
        // Start
        init();
    </script>
    
    <style>
        .quality-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .quality-modal-content {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 30px;
            min-width: 300px;
            text-align: center;
        }
        
        .quality-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .quality-option {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quality-option:hover {
            background: #ffd700;
            color: #1a1a2e;
        }
    </style>
</body>
</html>
