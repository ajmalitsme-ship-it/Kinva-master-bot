<!-- Form Components -->
<form class="form">
    <!-- Text Input -->
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username">
        <small class="form-text">Your unique username</small>
    </div>
    
    <!-- Email Input -->
    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter email">
    </div>
    
    <!-- Password Input -->
    <div class="form-group">
        <label for="password">Password</label>
        <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="Enter password">
            <button type="button" class="input-group-btn" onclick="togglePassword(this)">
                <i class="fas fa-eye"></i>
            </button>
        </div>
    </div>
    
    <!-- Textarea -->
    <div class="form-group">
        <label for="bio">Bio</label>
        <textarea id="bio" class="form-control" rows="4" placeholder="Tell us about yourself"></textarea>
    </div>
    
    <!-- Select Dropdown -->
    <div class="form-group">
        <label for="country">Country</label>
        <select id="country" class="form-control">
            <option value="">Select Country</option>
            <option value="IN">India</option>
            <option value="US">United States</option>
            <option value="UK">United Kingdom</option>
        </select>
    </div>
    
    <!-- Checkbox -->
    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" class="checkbox">
            <span class="checkmark"></span>
            I agree to the terms and conditions
        </label>
    </div>
    
    <!-- Radio Group -->
    <div class="form-group">
        <label>Account Type</label>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="account_type" value="free">
                <span class="radio-custom"></span>
                Free
            </label>
            <label class="radio-label">
                <input type="radio" name="account_type" value="premium">
                <span class="radio-custom"></span>
                Premium
            </label>
        </div>
    </div>
    
    <!-- Switch Toggle -->
    <div class="form-group">
        <label class="switch-label">
            <span>Enable Notifications</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
        </label>
    </div>
    
    <!-- File Upload -->
    <div class="form-group">
        <label for="file">Upload File</label>
        <div class="file-upload">
            <input type="file" id="file" class="file-input" accept="image/*">
            <div class="file-upload-area">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Drag & drop or click to upload</p>
                <small>Max file size: 50MB</small>
            </div>
        </div>
    </div>
    
    <!-- Range Slider -->
    <div class="form-group">
        <label>Volume: <span id="volumeValue">50</span>%</label>
        <input type="range" class="range-slider" min="0" max="100" value="50" oninput="updateRangeValue(this)">
    </div>
    
    <!-- Color Picker -->
    <div class="form-group">
        <label for="color">Pick Color</label>
        <input type="color" id="color" class="color-picker" value="#667eea">
    </div>
    
    <!-- Submit Button -->
    <button type="submit" class="btn btn-primary btn-block">Submit Form</button>
</form>

<script>
    function togglePassword(btn) {
        const input = btn.previousElementSibling;
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    
    function updateRangeValue(slider) {
        document.getElementById('volumeValue').textContent = slider.value;
    }
</script>
