<div id="premiumModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>⭐ Upgrade to Premium</h2>
            <button class="close-modal" onclick="closeModal('premiumModal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="pricing-card-modal">
                <div class="price">$14.99<span>/month</span></div>
                <ul class="features">
                    <li>✓ 4K Video Export</li>
                    <li>✓ No Watermark</li>
                    <li>✓ All Filters & Effects</li>
                    <li>✓ Unlimited Exports</li>
                    <li>✓ Priority Support</li>
                </ul>
                <button class="btn btn-primary btn-block" onclick="upgradePremium()">Get Premium</button>
                <p class="contact-admin">Contact @kinva_master for yearly plans</p>
            </div>
        </div>
    </div>
</div>

<div id="alertModal" class="modal">
    <div class="modal-content small">
        <div class="modal-header">
            <h2 id="alertTitle">Alert</h2>
            <button class="close-modal" onclick="closeModal('alertModal')">&times;</button>
        </div>
        <div class="modal-body">
            <p id="alertMessage"></p>
            <button class="btn btn-primary" onclick="closeModal('alertModal')">OK</button>
        </div>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content small">
        <div class="modal-header">
            <h2 id="confirmTitle">Confirm</h2>
            <button class="close-modal" onclick="closeModal('confirmModal')">&times;</button>
        </div>
        <div class="modal-body">
            <p id="confirmMessage"></p>
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeModal('confirmModal')">Cancel</button>
                <button class="btn btn-primary" id="confirmBtn">Confirm</button>
            </div>
        </div>
    </div>
</div>

<script>
    function showModal(modalId) {
        document.getElementById(modalId).classList.add('active');
    }
    
    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
    }
    
    function showAlert(title, message) {
        document.getElementById('alertTitle').textContent = title;
        document.getElementById('alertMessage').textContent = message;
        showModal('alertModal');
    }
    
    function showConfirm(title, message, callback) {
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').textContent = message;
        const confirmBtn = document.getElementById('confirmBtn');
        const oldClick = confirmBtn.onclick;
        confirmBtn.onclick = function() {
            callback();
            closeModal('confirmModal');
        };
        showModal('confirmModal');
    }
    
    function upgradePremium() {
        window.location.href = '/premium';
    }
    
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.classList.remove('active');
        }
    }
</script>
