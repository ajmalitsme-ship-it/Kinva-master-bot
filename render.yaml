# ============================================
# KINVA MASTER - RENDER DEPLOYMENT CONFIG
# ============================================

services:
  - type: web
    name: kinva-master
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      
      # ============================================
      # CRITICAL FIX: Create missing __init__.py files
      # ============================================
      mkdir -p src/utils
      mkdir -p src/handlers
      mkdir -p src/processors
      mkdir -p src/editors
      mkdir -p src/payment
      mkdir -p src/api
      
      # Create src/__init__.py
      cat > src/__init__.py << 'EOF'
__version__ = "1.0.0"
EOF
      
      # Create src/utils/__init__.py (THIS IS THE MISSING FILE!)
      cat > src/utils/__init__.py << 'EOF'
from .helpers import allowed_file, format_size, get_file_info

__all__ = ['allowed_file', 'format_size', 'get_file_info']
EOF
      
      # Create other __init__.py files
      touch src/handlers/__init__.py
      touch src/processors/__init__.py
      touch src/editors/__init__.py
      touch src/payment/__init__.py
      touch src/api/__init__.py
      
      # Verify the file exists
      echo "=== Verifying __init__.py files ==="
      ls -la src/utils/
      cat src/utils/__init__.py
      
    startCommand: gunicorn src.app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true
