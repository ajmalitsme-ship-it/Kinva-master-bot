services:
  # Web Service (Flask App)
  - type: web
    name: kinva-master-web
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 web_app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WEB_APP_URL
        fromService:
          type: web
          name: kinva-master-web
          property: url
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 5000

  # Background Worker (Telegram Bot)
  - type: worker
    name: kinva-master-bot
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py --mode bot
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WEB_APP_URL
        fromService:
          type: web
          name: kinva-master-web
          property: url
      - key: SECRET_KEY
        generateValue: true
